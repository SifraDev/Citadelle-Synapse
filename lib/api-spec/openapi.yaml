openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Venice AI Legal Analysis Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Document analysis operations
  - name: tasks
    description: Scheduled task operations
  - name: activity
    description: Activity log operations
  - name: telegram
    description: Telegram integration operations
  - name: payments
    description: Crypto payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeDocuments
      tags: [analysis]
      summary: Upload and analyze PDF documents
      description: Upload multiple PDFs for live analysis via Venice AI. Documents are processed in memory and immediately purged.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                mode:
                  type: string
                  enum: [summarize, extract_clauses, flag_risks, custom]
                customQuery:
                  type: string
              required:
                - files
                - mode
      responses:
        "200":
          description: SSE stream of analysis results
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required (x402 protocol)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/X402PaymentRequired"
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List scheduled tasks
      responses:
        "200":
          description: List of scheduled tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledTask"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a scheduled task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledTask"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{id}:
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a scheduled task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /activity:
    get:
      operationId: getActivityLogs
      tags: [activity]
      summary: Get activity logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"
  /activity/stream:
    get:
      operationId: streamActivity
      tags: [activity]
      summary: Stream live activity via SSE
      responses:
        "200":
          description: SSE stream of activity events
          content:
            text/event-stream:
              schema:
                type: string
  /telegram/status:
    get:
      operationId: getTelegramStatus
      tags: [telegram]
      summary: Get Telegram bot connection status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramStatus"
  /telegram/send:
    post:
      operationId: sendTelegramMessage
      tags: [telegram]
      summary: Send a message via Telegram bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramMessageInput"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /draft:
    post:
      operationId: generateSafeDraft
      tags: [analysis]
      summary: Generate a sanitized PDF draft from analysis text
      description: Takes raw analysis text, sanitizes it via Venice AI to remove all PII, and returns a downloadable PDF. Zero-retention — PDF is generated in memory and not stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftInput"
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: Get crypto payment logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Payment log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentEntry"
  /payments/wallet:
    get:
      operationId: getWalletInfo
      tags: [payments]
      summary: Get agent wallet info and USDC balance
      responses:
        "200":
          description: Wallet information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"
  /payments/charges:
    get:
      operationId: listCharges
      tags: [payments]
      summary: List all charge requests
      responses:
        "200":
          description: List of charges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChargeRequest"
  /payments/charge:
    post:
      operationId: createCharge
      tags: [payments]
      summary: Create a USDC charge request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChargeInput"
      responses:
        "201":
          description: Charge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeRequest"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/charge/{id}:
    get:
      operationId: getCharge
      tags: [payments]
      summary: Get charge details for payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Charge details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeDetail"
        "404":
          description: Charge not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCharge
      tags: [payments]
      summary: Cancel/expire a pending charge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Charge cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Cannot delete paid charge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Charge not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/confirm:
    post:
      operationId: confirmPayment
      tags: [payments]
      summary: Confirm a USDC payment with transaction hash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPaymentInput"
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transaction already recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/delegation:
    get:
      operationId: getDelegation
      tags: [payments]
      summary: Get current delegation status and EIP-712 type info
      responses:
        "200":
          description: Delegation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationInfo"
    post:
      operationId: submitDelegation
      tags: [payments]
      summary: Submit a signed EIP-712 delegation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDelegationInput"
      responses:
        "200":
          description: Delegation stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationStatus"
        "400":
          description: Invalid delegation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/identity:
    get:
      operationId: getAgentIdentity
      tags: [payments]
      summary: Get ERC-8004 agent identity status
      responses:
        "200":
          description: Agent identity information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
  /payments/identity/register:
    post:
      operationId: registerAgentIdentity
      tags: [payments]
      summary: Register agent on ERC-8004 IdentityRegistry
      responses:
        "200":
          description: Registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResult"
        "400":
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/agent-log:
    get:
      operationId: getAgentActionLog
      tags: [payments]
      summary: Get agent action log (ERC-8004 receipts)
      responses:
        "200":
          description: Agent action log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLogEntry"
  /budget:
    get:
      operationId: getBudgetStatus
      tags: [payments]
      summary: Get compute budget usage and limits
      responses:
        "200":
          description: Current compute budget status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetStatus"
  /x402/info:
    get:
      operationId: getX402Info
      tags: [payments]
      summary: Get x402 payment protocol pricing and instructions
      responses:
        "200":
          description: x402 pricing and payment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/X402Info"
  /payments/swap:
    post:
      operationId: executeSwap
      tags: [payments]
      summary: Manually trigger a USDC to ETH swap via Uniswap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapInput"
      responses:
        "200":
          description: Swap executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapResult"
        "400":
          description: Swap failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Delegation denied or unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Uniswap not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ScheduledTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        actionType:
          type: string
          enum: [analyze_document, send_reminder, charge_client, report_messages]
        mode:
          type: string
          enum: [summarize, extract_clauses, flag_risks, custom]
        customQuery:
          type: string
        reminderText:
          type: string
        targetChatId:
          type: string
        chargeAmount:
          type: number
        cronExpression:
          type: string
        nextRun:
          type: string
          format: date-time
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - actionType
        - active
        - createdAt
    CreateTaskInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        actionType:
          type: string
          enum: [analyze_document, send_reminder, charge_client, report_messages]
        mode:
          type: string
          enum: [summarize, extract_clauses, flag_risks, custom]
        customQuery:
          type: string
        reminderText:
          type: string
        targetChatId:
          type: string
        chargeAmount:
          type: number
        cronExpression:
          type: string
      required:
        - name
        - actionType
    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [upload, analysis, telegram, payment, task, system]
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - type
        - message
        - timestamp
    TelegramStatus:
      type: object
      properties:
        connected:
          type: boolean
        botUsername:
          type: string
        chatId:
          type: string
        locus:
          $ref: "#/components/schemas/LocusStatus"
      required:
        - connected
    LocusStatus:
      type: object
      properties:
        connected:
          type: boolean
        walletAddress:
          type: string
        balance:
          type: string
        chain:
          type: string
        allowance:
          type: number
      required:
        - connected
    TelegramMessageInput:
      type: object
      properties:
        message:
          type: string
        chatId:
          type: string
      required:
        - message
    DraftInput:
      type: object
      properties:
        analysisText:
          type: string
        mode:
          type: string
      required:
        - analysisText
    PaymentEntry:
      type: object
      properties:
        id:
          type: string
        txHash:
          type: string
        from:
          type: string
        to:
          type: string
        amount:
          type: string
        token:
          type: string
        status:
          type: string
          enum: [pending, confirmed, failed]
        timestamp:
          type: string
          format: date-time
        network:
          type: string
        paymentMethod:
          type: string
          enum: [direct, locus, swap]
      required:
        - id
        - amount
        - token
        - status
        - timestamp
    WalletInfo:
      type: object
      properties:
        address:
          type: string
        usdcBalance:
          type: string
        ethBalance:
          type: string
        vvvBalance:
          type: string
        usdcContract:
          type: string
        network:
          type: string
        chainId:
          type: integer
        uniswapConfigured:
          type: boolean
        locus:
          $ref: "#/components/schemas/LocusStatus"
      required:
        - address
        - usdcBalance
        - network
        - chainId
    ChargeRequest:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [pending, paid, expired]
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        txHash:
          type: string
        paidFrom:
          type: string
        locusWalletAddress:
          type: string
      required:
        - id
        - amount
        - status
        - createdAt
    CreateChargeInput:
      type: object
      properties:
        amount:
          type: number
        label:
          type: string
      required:
        - amount
    ChargeDetail:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [pending, paid, expired]
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        txHash:
          type: string
        paidFrom:
          type: string
        walletAddress:
          type: string
        usdcContract:
          type: string
        network:
          type: string
        chainId:
          type: integer
        paymentMethod:
          type: string
          enum: [direct, locus]
        locusWalletAddress:
          type: string
      required:
        - id
        - amount
        - status
        - createdAt
        - walletAddress
        - network
        - chainId
    ConfirmPaymentInput:
      type: object
      properties:
        txHash:
          type: string
          description: Transaction hash to verify on-chain
        chargeId:
          type: string
          description: Optional charge ID to link this payment to
      required:
        - txHash
    DelegationStatus:
      type: object
      properties:
        active:
          type: boolean
        delegator:
          type: string
        delegate:
          type: string
        dailyLimitUsdc:
          type: number
        dailyUsedUsdc:
          type: number
        dailyRemainingUsdc:
          type: number
        expiresAt:
          type: string
          format: date-time
        expired:
          type: boolean
        signedAt:
          type: string
          format: date-time
        reason:
          type: string
      required:
        - active
    DelegationInfo:
      type: object
      properties:
        active:
          type: boolean
        delegator:
          type: string
        delegate:
          type: string
        dailyLimitUsdc:
          type: number
        dailyUsedUsdc:
          type: number
        dailyRemainingUsdc:
          type: number
        expiresAt:
          type: string
          format: date-time
        expired:
          type: boolean
        signedAt:
          type: string
          format: date-time
        reason:
          type: string
        eip712:
          type: object
          properties:
            domain:
              type: object
              properties:
                name:
                  type: string
                version:
                  type: string
                chainId:
                  type: integer
            types:
              type: object
              additionalProperties: true
            primaryType:
              type: string
            allowedContract:
              type: string
      required:
        - active
    SubmitDelegationInput:
      type: object
      properties:
        delegator:
          type: string
        delegate:
          type: string
        allowedContract:
          type: string
        dailyLimitUsdc:
          type: number
        expiresAt:
          type: number
        signature:
          type: string
      required:
        - delegator
        - delegate
        - allowedContract
        - dailyLimitUsdc
        - expiresAt
        - signature
    AgentIdentity:
      type: object
      properties:
        registered:
          type: boolean
        agentId:
          type: integer
        tokenURI:
          type: string
        registryAddress:
          type: string
        reputationRegistryAddress:
          type: string
        walletAddress:
          type: string
        registrationTxHash:
          type: string
        reputationScore:
          type: integer
        feedbackCount:
          type: integer
      required:
        - registered
        - registryAddress
        - reputationRegistryAddress
        - walletAddress
    RegistrationResult:
      type: object
      properties:
        success:
          type: boolean
        agentId:
          type: integer
        txHash:
          type: string
        error:
          type: string
      required:
        - success
    AgentLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum: [swap, payment, delegation, registration, reputation]
        description:
          type: string
        txHash:
          type: string
        amount:
          type: string
        token:
          type: string
        counterparty:
          type: string
        decision:
          $ref: "#/components/schemas/DecisionRecord"
      required:
        - timestamp
        - type
        - description
    DecisionRecord:
      type: object
      properties:
        trigger:
          type: string
        plan:
          type: string
        execution:
          type: string
        verification:
          type: string
        outcome:
          type: string
      required:
        - trigger
        - plan
        - execution
        - verification
        - outcome
    BudgetStatus:
      type: object
      properties:
        categories:
          type: object
          additionalProperties:
            type: object
            properties:
              used:
                type: integer
              limit:
                type: integer
              percentUsed:
                type: integer
              estimatedCost:
                type: number
        overall:
          type: object
          properties:
            used:
              type: integer
            limit:
              type: integer
            percentUsed:
              type: integer
        lastResetAt:
          type: string
          format: date-time
        nextResetAt:
          type: string
          format: date-time
      required:
        - categories
        - overall
        - lastResetAt
        - nextResetAt
    X402Info:
      type: object
      properties:
        protocol:
          type: string
        version:
          type: string
        services:
          type: array
          items:
            type: object
            additionalProperties: true
        paymentDetails:
          type: object
          properties:
            recipient:
              type: string
            token:
              type: string
            chain:
              type: string
            chainId:
              type: integer
        capabilities:
          type: array
          items:
            type: string
      required:
        - protocol
        - version
        - services
        - paymentDetails
    SwapInput:
      type: object
      properties:
        amount:
          type: number
          description: USDC amount to swap to ETH
      required:
        - amount
    SwapResult:
      type: object
      properties:
        success:
          type: boolean
        txHash:
          type: string
        amountIn:
          type: string
        amountOut:
          type: string
        error:
          type: string
        delegationDenied:
          type: boolean
        reason:
          type: string
      required:
        - success
    X402PaymentRequired:
      type: object
      properties:
        status:
          type: integer
          enum: [402]
        protocol:
          type: string
          enum: [x402]
        message:
          type: string
        paymentDetails:
          type: object
          properties:
            recipient:
              type: string
            token:
              type: string
            tokenSymbol:
              type: string
            chain:
              type: string
            chainId:
              type: integer
            minimumAmount:
              type: string
            pricePerPage:
              type: string
            currency:
              type: string
          required:
            - recipient
            - token
            - minimumAmount
        headers:
          type: object
          properties:
            required:
              type: string
            description:
              type: string
        discoveryEndpoint:
          type: string
        error:
          type: string
        providedTxHash:
          type: string
      required:
        - status
        - protocol
        - message
        - paymentDetails
